  nox:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add ~/bin to PATH
        run: echo "PATH=/home/runner/bin:$PATH" >> $GITHUB_ENV

      - name: Prep
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          mkdir ~/bin
          curl https://mise.jdx.dev/mise-latest-linux-x64 > ~/bin/mise
          chmod +x ~/bin/mise
          mise trust

          mise use -g ubi:astral-sh/uv
          mkdir -p /home/runner/.local/share/uv/python/

          mise install

          # Python versions
          echo "Python versions:"
          mise exec -- python --version
          mise exec -- uv run python --version

          # Path
          echo "Path:"
          echo $PATH

          #mise demo --no-bootstrap --no-nox
          #mise sandbox --doctor

          # Nox
          mise exec -- uv run nox -x -- -x
